<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      background: #ffffff;
      font-family: 'Inter', sans-serif;
      padding: 80px 100px;
      position: relative;
      overflow: hidden;
    }
    .top-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #111;
    }
    .logo {
      height: 40px;
      margin-bottom: 48px;
      opacity: 0.9;
    }
    .headline {
      font-size: 64px;
      font-weight: 300;
      letter-spacing: -0.03em;
      color: #111;
      line-height: 1.15;
      margin-bottom: 24px;
    }
    .subline {
      font-size: 22px;
      font-weight: 300;
      color: #737373;
      line-height: 1.6;
      max-width: 700px;
    }
    .tag {
      position: absolute;
      bottom: 80px;
      left: 100px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #a3a3a3;
    }
    .accent {
      position: absolute;
      right: 80px;
      bottom: 60px;
      width: 120px;
      height: 120px;
      border: 1px solid #e5e5e5;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <img class="logo" src="https://images.squarespace-cdn.com/content/v1/5a98693a266c07ce3d9a04ee/f98d3f04-9164-4bc3-8968-3afbef39ea68/logo.png" alt="H&V">
  <div class="headline">Wir stellen ein.</div>
  <div class="subline">Tradition trifft Innovation — Stickerei für internationale Mode- und Lingeriemarken. Designed in Austria.</div>
  <div class="tag">career-hv.vercel.app</div>
  <div class="accent"></div>
</body>
</html>
